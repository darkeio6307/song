<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARSHAD Vibes | Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-default">
    <div class="live-aura"></div>

    <div class="app-container">
        
        <div id="splashScreen" class="splash-screen">
            <div class="loader-content">
                <div class="logo-glow"></div>
                <i class="fa-solid fa-compact-disc spin-slow"></i>
                <h1>ARSHAD<span>PRO</span></h1>
                <div class="loading-track"><div class="loading-progress"></div></div>
            </div>
        </div>

        <div id="loginScreen" class="login-screen hidden">
            <div class="cyber-login-card">
                <div class="login-header">
                    <div class="fingerprint-box">
                        <i class="fa-solid fa-fingerprint fingerprint-scan"></i>
                        <div class="scan-line"></div>
                    </div>
                    <h2>SYSTEM LOGIN</h2>
                    <p>Enter VIP Credentials</p>
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-user-astronaut"></i>
                    <input type="text" id="username" placeholder="Username" autocomplete="off">
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-key"></i>
                    <input type="password" id="password" placeholder="Passcode">
                </div>
                <button id="loginBtn">ACCESS TERMINAL <i class="fa-solid fa-bolt"></i></button>
                <p id="loginError" class="error">Access Denied: Invalid Identity</p>
            </div>
        </div>

        <div id="mainApp" class="main-app hidden">
            
            <header class="main-header">
                <div class="greet-area">
                    <p id="timeGreeting">Good Evening,</p>
                    <h2 id="userName" class="hologram-text">Dark_eio</h2>
                </div>
                <div class="status-widgets">
                    <div class="profile-trigger" id="profileBtn">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Arshad" alt="avatar" id="userAvatar">
                    </div>
                    <div class="visualizer hidden" id="eqBars">
                        <span></span><span></span><span></span><span></span>
                    </div>
                </div>
            </header>

            <div class="search-bar-v2" id="searchSection">
                <div class="search-inner">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="Search the universe...">
                    <button id="searchBtn">GO</button>
                </div>
            </div>

            <section class="music-library">
                <div class="lib-header">
                    <h3 id="listHeading">Discovery</h3>
                    <div id="floatingQuote" class="quote-text">Vibe higher...</div>
                </div>
                <div id="songsList" class="songs-grid-vertical"></div>
            </section>

            <div class="pro-player">
                <div class="seek-wrapper">
                    <span class="time-label" id="timeCurrent">0:00</span>
                    <input type="range" id="seekSlider" min="0" max="100" value="0" class="custom-slider">
                    <span class="time-label" id="timeTotal">0:00</span>
                </div>

                <div class="player-main-ui">
                    <div class="now-playing">
                        <div class="vinyl-record" id="vinylDisk">
                            <img id="playerCover" src="https://via.placeholder.com/80" alt="disk">
                            <div class="record-hole"></div>
                        </div>
                        <div class="song-meta">
                            <h4 id="playerTitle">Arshad Music</h4>
                            <p id="playerArtist">Elite Edition</p>
                        </div>
                    </div>
                    
                    <div class="playback-controls">
                        <button id="shareBtn" class="action-btn"><i class="fa-solid fa-share-nodes"></i></button>
                        <button id="prevBtn"><i class="fa-solid fa-backward-fast"></i></button>
                        <button id="playBtn" class="play-trigger"><i class="fa-solid fa-play"></i></button>
                        <button id="nextBtn"><i class="fa-solid fa-forward-fast"></i></button>
                        <button id="downloadBtn" class="action-btn"><i class="fa-solid fa-download"></i></button>
                    </div>
                </div>
            </div>

            <nav class="dock-nav">
                <div class="dock-item active" id="btnHome"><i class="fa-solid fa-infinity"></i><span>Explore</span></div>
                <div class="dock-item" id="btnPlaylist"><i class="fa-solid fa-heart-pulse"></i><span>Library</span></div>
                <div class="dock-item" id="btnVIP"><i class="fa-solid fa-shield-halved"></i><span>Pro</span></div>
            </nav>
        </div>

        <div id="profileSidebar" class="profile-sidebar">
            <div class="sidebar-header">
                <button id="closeProfileBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="profile-card">
                <div class="prof-img-box">
                    <img id="sideProfAvatar" src="" alt="Profile">
                    <div class="online-dot"></div>
                </div>
                <h2 id="profName" class="hologram-text">Name</h2>
                <div class="relation-badge" id="profRelation">Relation</div>
                
                <ul class="prof-stats">
                    <li><i class="fa-solid fa-music"></i> <strong>Vault Status:</strong> <span id="profSongCount">0</span> Songs</li>
                    <li><i class="fa-solid fa-palette"></i> <strong>Theme:</strong> <span id="profThemeName">Dark Neon</span></li>
                    <li><i class="fa-solid fa-clock"></i> <strong>Access:</strong> Unlimited VIP</li>
                </ul>

                <button id="logoutBtn" class="logout-btn"><i class="fa-solid fa-power-off"></i> LOGOUT</button>
            </div>
        </div>
        <div id="sidebarOverlay" class="sidebar-overlay"></div>

        <div id="toast" class="toast-popup">Confirmed!</div>
    </div>

    <audio id="audioEngine"></audio>
    <script src="script.js"></script>
</body>
</html>
