<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARSHAD Vibes | Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        
        <div id="splashScreen" class="splash-screen">
            <div class="logo-box">
                <i class="fa-solid fa-music"></i>
                <h1>ARSHAD</h1>
            </div>
        </div>

        <div id="loginScreen" class="login-screen hidden">
            <div class="glass-box">
                <h2>VIP Lounge</h2>
                <p>ख़ास मेहमानों के लिए</p>
                <input type="text" id="username" placeholder="Username">
                <input type="password" id="password" placeholder="Password">
                <button id="loginBtn">अंदर आएं</button>
                <p id="loginError" class="error">ग़लत पहचान!</p>
            </div>
        </div>

        <div id="mainApp" class="main-app hidden">
            
            <header class="top-header">
                <div class="greeting-box">
                    <p id="greeting">Good Morning,</p>
                    <h2 class="shimmer-name" id="userName">Dark_eio</h2>
                </div>
                <div class="time-box" id="clock">10:00 AM</div>
            </header>

            <div class="search-area" id="searchArea">
                <input type="text" id="searchInput" placeholder="गाना तलाशें...">
                <button id="searchBtn"><i class="fa-solid fa-search"></i></button>
            </div>

            <main class="content-area">
                <h3 id="listTitle" class="section-title">Trending Vibes</h3>
                <div id="songsList" class="songs-list">
                    </div>
            </main>

            <div class="player-bar">
                <div class="progress-bg" id="progressArea">
                    <div class="progress-fill" id="progressBar"></div>
                </div>
                <div class="player-content">
                    <img id="playerImg" src="https://via.placeholder.com/50" alt="Cover">
                    <div class="player-info">
                        <marquee id="playerTitle" behavior="scroll" direction="left">Select a Song</marquee>
                        <p id="playerArtist">Artist</p>
                    </div>
                    <div class="controls">
                        <button id="prevBtn"><i class="fa-solid fa-backward-step"></i></button>
                        <button id="playBtn" class="play-main"><i class="fa-solid fa-play"></i></button>
                        <button id="nextBtn"><i class="fa-solid fa-forward-step"></i></button>
                    </div>
                </div>
            </div>

            <nav class="bottom-nav">
                <div class="nav-item active" id="tabHome"><i class="fa-solid fa-house"></i><span>Home</span></div>
                <div class="nav-item" id="tabPlaylist"><i class="fa-solid fa-heart"></i><span>My Playlist</span></div>
                <div class="nav-item" id="vipBtn"><i class="fa-solid fa-crown"></i><span>VIP</span></div>
            </nav>
        </div>

        <div id="toast" class="toast">Action Successful</div>
    </div>
    
    <audio id="audioPlayer"></audio>
    <script src="script.js"></script>
</body>
</html>
