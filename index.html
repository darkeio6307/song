<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARSHAD Vibes | Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="animated-bg"></div>

    <div id="floatingQuote" class="floating-quote hidden">सुकून भरे नग्मे...</div>

    <div id="loginScreen" class="login-screen">
        <div class="login-glass">
            <div class="login-logo">
                <i class="fa-solid fa-music"></i>
            </div>
            <h2>VIP लाउंज</h2>
            <p>ख़ास मेहमानों की महफ़िल</p>
            
            <div class="input-container">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" placeholder="पहचान (Username)" autocomplete="off">
            </div>
            <div class="input-container">
                <i class="fa-solid fa-key"></i>
                <input type="password" id="password" placeholder="ख़ुफ़िया चाबी (Password)">
            </div>
            
            <button id="loginBtn" class="premium-btn">दाख़िल हों <i class="fa-solid fa-arrow-right"></i></button>
            <p id="loginError" class="error-text">ग़लत पहचान मेरे दोस्त!</p>
        </div>
    </div>

    <div id="mainApp" class="main-app hidden">
        <header class="dynamic-header">
            <div class="header-left">
                <p id="greetingText">Good Morning,</p>
                <h1 id="welcomeUser">Dark_eio</h1>
            </div>
            <div class="header-right">
                <div class="time-display" id="currentTimeDisp">10:00 AM</div>
                <div class="user-avatar"><i class="fa-solid fa-user-astronaut"></i></div>
            </div>
        </header>

        <div class="search-section">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="कोई अज़ीज़ नग्मा तलाशें...">
                <button id="searchBtn">खोजें</button>
            </div>
        </div>

        <main class="songs-container">
            <div class="section-header">
                <h3 id="statusText">ताज़ा और बेहतरीन</h3>
                <i class="fa-solid fa-fire"></i>
            </div>
            <div id="songsList" class="songs-list">
                </div>
        </main>

        <div class="glass-player">
            <div class="player-progress" id="progressArea">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <div class="player-inner">
                <div class="song-details">
                    <img id="playerCover" src="https://via.placeholder.com/60" alt="Cover" class="record-spin-paused">
                    <div class="song-titles">
                        <marquee behavior="scroll" direction="left" id="playerTitle">ARSHAD Music</marquee>
                        <p id="playerArtist">VIP Vibes</p>
                    </div>
                </div>
                
                <div class="player-actions">
                    <button id="prevBtn"><i class="fa-solid fa-backward-step"></i></button>
                    <button id="playBtn" class="play-pulse"><i class="fa-solid fa-play"></i></button>
                    <button id="nextBtn"><i class="fa-solid fa-forward-step"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div id="toastMsg" class="toast-message">VIP Access Activated</div>

    <audio id="mainAudio"></audio>
    <script src="script.js"></script>
</body>
</html>
