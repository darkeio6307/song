<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARSHAD Vibes | Elite VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-default">
    <div id="splashScreen" class="splash-screen">
        <h1 class="glitch-text">ARSHAD<span>VIP</span></h1>
        <div class="loading-track"><div class="loading-progress"></div></div>
    </div>

    <div id="loginScreen" class="login-screen hidden">
        <div class="cyber-login-card glass-widget-heavy">
            <h2 id="loginTitle">ELITE PORTAL</h2>
            <div id="loginMode">
                <input type="text" id="username" class="glass-input" placeholder="Identity">
                <input type="password" id="password" class="glass-input" placeholder="Cipher">
                <button id="loginBtn" class="neon-btn-pro">INITIALIZE ⚡</button>
                <p id="toggleRegister" class="toggle-link">Register New Identity</p>
            </div>
            <div id="registerMode" class="hidden">
                <input type="text" id="regUsername" class="glass-input" placeholder="New ID">
                <input type="password" id="regPassword" class="glass-input" placeholder="New Cipher">
                <button id="registerBtn" class="neon-btn-pro">CREATE ACCESS</button>
                <p id="toggleLogin" class="toggle-link">Back to Portal</p>
            </div>
        </div>
    </div>

    <div id="mainApp" class="main-app hidden">
        <header class="main-header">
            <div class="greet-area"><h2 id="userName" class="hologram-text">User</h2></div>
            <div class="profile-trigger" id="profileBtn"><img id="userAvatar" src="guest.jpg"></div>
        </header>

        <div class="live-stories-wrapper hidden" id="liveActivityArea">
            <p class="section-micro-title">Live Elite Activity</p>
            <div class="stories-scroll" id="liveStoriesContainer"></div>
        </div>

        <div class="search-bar"><input type="text" id="searchInput" placeholder="Search the soul..."><button id="searchBtn">GO</button></div>

        <div id="chatSection" class="chat-container glass-widget hidden">
            <div class="chat-header"><span>Elite Soul Chat</span><button id="closeChat"><i class="fa-solid fa-xmark"></i></button></div>
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input-area"><input type="text" id="chatInput" placeholder="Write a soul message..."><button id="sendMsgBtn"><i class="fa-solid fa-paper-plane"></i></button></div>
        </div>

        <section class="music-library"><div id="songsList" class="songs-grid-vertical"></div></section>

        <div class="pro-player glass-widget-heavy">
            <input type="range" id="seekSlider" min="0" max="100" value="0" class="custom-slider">
            <div class="player-main-ui">
                <div class="now-playing"><img id="playerCover" src="guest.jpg"><div><h4 id="playerTitle">Arshad Music</h4><p id="playerArtist">Elite</p></div></div>
                <div class="playback-controls">
                    <button id="playBtn" class="play-trigger"><i class="fa-solid fa-play"></i></button>
                    <button id="openChatBtn"><i class="fa-solid fa-comment-dots"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div id="profileSidebar" class="profile-sidebar glass-widget-heavy">
        <div class="profile-card">
            <img id="sideProfAvatar" src="guest.jpg">
            <h2 id="profName">User</h2>
            <p id="profRelation">Member</p>
            <button id="logoutBtn" class="logout-btn">LOGOUT</button>
        </div>
    </div>
    <audio id="audioEngine"></audio>
    <script type="module" src="script.js"></script>
</body>
</html>
