<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARSHAD Music | Ultra Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
        <div id="splashScreen" class="splash-screen">
            <div class="loader-content">
                <div class="logo-glow"></div>
                <i class="fa-solid fa-bolt-lightning"></i>
                <h1>ARSHAD<span>PRO</span></h1>
            </div>
        </div>

        <div id="loginScreen" class="login-screen hidden">
            <div class="login-card">
                <div class="login-header">
                    <i class="fa-solid fa-fingerprint fingerprint-scan"></i>
                    <h2>VIP लाउंज</h2>
                    <p>Identity Verification Required</p>
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" placeholder="पहचान (Username)" autocomplete="off">
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="ख़ुफ़िया चाबी (Passcode)">
                </div>
                <button id="loginBtn">अंदर आएं <i class="fa-solid fa-arrow-right-to-bracket"></i></button>
                <p id="loginError" class="error">ग़लत पहचान मेरे दोस्त!</p>
            </div>
        </div>

        <div id="mainApp" class="main-app hidden">
            
            <header class="main-header">
                <div class="greet-area">
                    <p id="timeGreeting">Good Evening,</p>
                    <h2 id="userName" class="neon-text">Dark_eio</h2>
                </div>
                <div class="status-widgets">
                    <div class="clock-chip" id="liveClock">00:00</div>
                    <div class="vip-tag">VIP</div>
                </div>
            </header>

            <div class="search-bar-v2" id="searchSection">
                <div class="search-inner">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="कोई अज़ीज़ नग्मा तलाशें...">
                    <button id="searchBtn">खोजें</button>
                </div>
            </div>

            <section class="music-library">
                <div class="lib-header">
                    <h3 id="listHeading">Discovery</h3>
                    <div id="floatingQuote" class="quote-text">सुकून भरे नग्मे...</div>
                </div>
                <div id="songsList" class="songs-grid-vertical">
                    </div>
            </section>

            <div class="pro-player">
                <div class="seek-wrapper">
                    <span class="time-label" id="timeCurrent">0:00</span>
                    <input type="range" id="seekSlider" min="0" max="100" value="0" class="custom-slider">
                    <span class="time-label" id="timeTotal">0:00</span>
                </div>

                <div class="player-main-ui">
                    <div class="now-playing">
                        <div class="disk-wrapper">
                            <img id="playerCover" src="https://via.placeholder.com/80" alt="disk">
                        </div>
                        <div class="song-meta">
                            <h4 id="playerTitle">Arshad Music</h4>
                            <p id="playerArtist">Elite Edition</p>
                        </div>
                    </div>
                    
                    <div class="playback-controls">
                        <button id="prevBtn"><i class="fa-solid fa-backward-fast"></i></button>
                        <button id="playBtn" class="play-trigger"><i class="fa-solid fa-play"></i></button>
                        <button id="nextBtn"><i class="fa-solid fa-forward-fast"></i></button>
                    </div>
                </div>
            </div>

            <nav class="dock-nav">
                <div class="dock-item active" id="btnHome"><i class="fa-solid fa-house-chimney-window"></i><span>Home</span></div>
                <div class="dock-item" id="btnPlaylist"><i class="fa-solid fa-heart-pulse"></i><span>Playlist</span></div>
                <div class="dock-item" id="btnVIP"><i class="fa-solid fa-gem"></i><span>Premium</span></div>
            </nav>
        </div>

        <div id="toast" class="toast-popup">Confirmed!</div>
    </div>

    <audio id="audioEngine"></audio>
    <script src="script.js"></script>
</body>
</html>
