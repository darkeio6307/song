<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARSHAD Music Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="splashScreen" class="splash-screen">
        <div class="apple-logo">
            <i class="fa-solid fa-music"></i>
            <h1>ARSHAD</h1>
        </div>
    </div>

    <div id="loginScreen" class="login-screen hidden">
        <div class="login-box">
            <div class="glass-circle"></div>
            <h2>VIP Lounge</h2>
            <div class="input-field">
                <input type="text" id="username" placeholder="Username" autocomplete="off">
            </div>
            <div class="input-field">
                <input type="password" id="password" placeholder="Password">
            </div>
            <button id="loginBtn">Unlock VIP</button>
            <p id="loginError" class="error-msg">Galat Password, Bhai!</p>
        </div>
    </div>

    <div id="mainApp" class="main-app hidden">
        <header class="ios-header">
            <div class="header-top">
                <h2>Arshad <span>Music</span></h2>
                <div class="user-badge" id="userTag">Guest</div>
            </div>
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Search Songs, Artists...">
                <button id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </header>

        <main class="scroll-area">
            <h3 class="list-title" id="statusText">Trending Now</h3>
            <div id="songsList" class="songs-list">
                </div>
        </main>

        <div class="player-bar">
            <div class="progress-container" id="progressArea">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="player-content">
                <div class="song-meta">
                    <img id="playerCover" src="https://via.placeholder.com/50" alt="cover">
                    <div class="meta-text">
                        <marquee behavior="scroll" direction="left" id="playerTitle">Select a Song</marquee>
                        <p id="playerArtist">VIP Edition</p>
                    </div>
                </div>
                <div class="time-info">
                    <span id="currTime">0:00</span> / <span id="totalTime">0:00</span>
                </div>
                <div class="main-controls">
                    <button id="prevBtn"><i class="fa-solid fa-backward-step"></i></button>
                    <button id="playBtn" class="play-circle"><i class="fa-solid fa-play"></i></button>
                    <button id="nextBtn"><i class="fa-solid fa-forward-step"></i></button>
                </div>
            </div>
        </div>

        <nav class="ios-nav">
            <div class="nav-btn active" onclick="location.reload()"><i class="fa-solid fa-house"></i><p>Home</p></div>
            <div class="nav-btn" id="exploreBtn"><i class="fa-solid fa-compass"></i><p>Explore</p></div>
            <div class="nav-btn vip-glow" id="vipBtn"><i class="fa-solid fa-crown"></i><p>VIP</p></div>
        </nav>
    </div>

    <div id="toast" class="toast">Only VIP Allowed!</div>

    <audio id="mainAudio"></audio>
    <script src="script.js"></script>
</body>
</html>
